name: ML Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Retraining trigger: runs every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: "Run full DVC pipeline (train + evaluate)"
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Code quality — lint + format check
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff==0.4.1

      - name: Run ruff linter
        run: ruff check src/ tests/

      - name: Run ruff formatter check
        run: ruff format --check src/ tests/

  # ────────────────────────────────────────────────────────────
  # Job 2: Unit & integration tests with coverage
  # ────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            --cov-fail-under=70 \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: reports/coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────
  # Job 3: DVC pipeline — train + evaluate (on main push)
  # ────────────────────────────────────────────────────────────
  pipeline:
    name: DVC Pipeline (Train + Evaluate)
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to main, scheduled runs, or manual dispatch
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_pipeline == 'true')

    env:
      # DagsHub MLflow credentials — set these as GitHub Secrets
      # Settings → Secrets and variables → Actions → New repository secret
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure DVC remote (Google Drive)
        # DVC pulls data from Google Drive remote.
        # GDRIVE_CREDENTIALS_DATA is a secret containing service account JSON.
        # See: https://dvc.org/doc/user-guide/data-management/remote-storage/google-drive
        run: |
          dvc remote modify gdrive gdrive_use_service_account true
          dvc remote modify gdrive gdrive_service_account_json_file_path /tmp/gdrive_creds.json
          echo '${{ secrets.GDRIVE_CREDENTIALS_DATA }}' > /tmp/gdrive_creds.json
        if: env.MLFLOW_TRACKING_USERNAME != ''

      - name: Pull data from DVC remote
        run: dvc pull data/raw --run-cache
        continue-on-error: true   # first run may have no remote data yet

      - name: Run DVC pipeline (repro)
        run: |
          dvc repro --no-commit 2>&1

      - name: Show DVC metrics diff
        run: dvc metrics diff HEAD~1 || echo "No previous run to diff"

      - name: Show DVC params diff
        run: dvc params diff HEAD~1 || echo "No previous run to diff"

      - name: Push model artefacts to DVC remote
        run: dvc push models/
        continue-on-error: true

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-reports-${{ github.sha }}
          path: |
            reports/metrics.json
            reports/figures/*.png
            reports/classification_report.txt
            reports/drift_report.html
          retention-days: 30

      - name: Comment metrics on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let metrics = {};
            try {
              metrics = JSON.parse(fs.readFileSync('reports/metrics.json', 'utf8'));
            } catch(e) {
              console.log('No metrics file found');
              return;
            }
            const body = `## 🤖 ML Pipeline Results\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| ROC-AUC | ${metrics.roc_auc?.toFixed(4) ?? 'N/A'} |\n` +
              `| Avg Precision | ${metrics.average_precision?.toFixed(4) ?? 'N/A'} |\n` +
              `| F1 Score | ${metrics.f1?.toFixed(4) ?? 'N/A'} |\n` +
              `| Precision | ${metrics.precision?.toFixed(4) ?? 'N/A'} |\n` +
              `| Recall | ${metrics.recall?.toFixed(4) ?? 'N/A'} |\n` +
              `| Fraud Detected | ${metrics.n_fraud_detected ?? 'N/A'} / ${metrics.n_actual_fraud ?? 'N/A'} |\n\n` +
              `[View full MLflow run on DagsHub](https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ github.event.repository.name }})`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ────────────────────────────────────────────────────────────
  # Job 4: Build and push Docker image (on main only)
  # ────────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
