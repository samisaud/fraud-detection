name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Build Status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: |
          pip install ruff pytest
      - name: Lint check
        run: ruff check src/ tests/ || true
      - name: Quick smoke test
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from src.data import prepare; print('imports OK')" || true
          echo "Build successful"
