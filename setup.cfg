[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = src
omit =
    tests/*
    # Pipeline orchestration scripts — need real data files, tested via dvc repro
    src/models/train.py
    src/evaluation/evaluate.py
    src/evaluation/drift.py

[coverage:report]
fail_under = 50
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    pass
